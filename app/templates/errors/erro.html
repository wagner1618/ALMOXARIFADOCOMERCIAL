{% extends "base.html" %}
{% block titulo %}Erro {{ codigo }}{% endblock %}

{% block corpo %}
<div class="auth-wrapper">
  <div class="text-center text-white">
    <div class="display-1 fw-bold">{{ codigo }}</div>
    <h1 class="h4">{{ titulo }}</h1>
    <p class="text-white-50">{{ mensagem }}</p>

    </a>
  </div>
</div>
{% endblock %}
