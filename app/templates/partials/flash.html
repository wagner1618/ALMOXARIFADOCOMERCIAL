{% with mensagens = get_flashed_messages(with_categories=true) %}
  {% if mensagens %}
    <div class="flash-area">
      {% for categoria, texto in mensagens %}
        {% set tipo = {'message':'info','error':'danger'}.get(categoria, categoria) %}
        <div class="alert alert-{{ tipo }} alert-dismissible fade show shadow-sm" role="alert">
          <i class="bi {{ {'success':'bi-check-circle','danger':'bi-exclamation-octagon','warning':'bi-exclamation-triangle','info':'bi-info-circle'}.get(tipo,'bi-info-circle') }} me-1"></i>
          {{ texto }}
          <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Fechar"></button>
        </div>
      {% endfor %}
    </div>
  {% endif %}
{% endwith %}
