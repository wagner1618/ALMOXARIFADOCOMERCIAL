# Proxy reverso para a aplicação. Em produção, adicione o bloco TLS
# (Let's Encrypt) e redirecione 80 -> 443.

upstream almox_app {
    server app:8000;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 25m;

    # Uploads servidos diretamente pelo Nginx (volume compartilhado).
    location /static/uploads/ {
        alias /usr/share/nginx/uploads/;
        access_log off;
        expires 7d;
    }

    # Demais estáticos (CSS/JS/vendor) e app via Gunicorn.
    location /static/ {
        proxy_pass http://almox_app;
        expires 7d;
    }

    location /healthz {
        proxy_pass http://almox_app;
        access_log off;
    }

    location / {
        proxy_pass http://almox_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}

