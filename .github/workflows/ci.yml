name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  qualidade-e-testes:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: almox_test
          POSTGRES_USER: almox
          POSTGRES_PASSWORD: almox
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U almox"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SECRET_KEY: ci-secret
      TEST_DATABASE_URL: postgresql+psycopg://almox:almox@localhost:5432/almox_test

    steps:
      - uses: actions/checkout@v4

      - name: Instalar uv
        uses: astral-sh/setup-uv@v2

      - name: Configurar Python
        run: uv python install 3.12

      - name: Instalar dependências
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Formatação (ruff format --check)
        run: uv run ruff format --check .

      - name: Type check (mypy)
        run: uv run mypy app
        continue-on-error: true

      - name: Testes (pytest)
        run: uv run pytest
